# Production stack for a single VM (EC2): Postgres + API + frontend on :80.
# Secrets come from /opt/faithbrains/.env (never in git):
#   POSTGRES_PASSWORD, DATABASE_URL, OPENAI_API_KEY, VOYAGE_API_KEY, ADMIN_TOKEN, CORS_ORIGINS
#   docker compose -f deploy/compose.prod.yml --env-file /opt/faithbrains/.env up -d --build
services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: faithbrains
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: faithbrains
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faithbrains"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ../backend
    restart: unless-stopped
    environment:
      # e.g. postgresql+asyncpg://faithbrains:${POSTGRES_PASSWORD}@db:5432/faithbrains
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      AI_PROVIDER: auto
      EMBEDDING_PROVIDER: voyage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ../frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://api:8000
    ports:
      - "80:3000"
    depends_on:
      - api

volumes:
  pgdata:
